<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小宝伴眠助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Saira:wght@400;600;700&display=swap");

    * { margin: 0; box-sizing: border-box; }

    body {
      font-family: 'Saira', sans-serif;
      background: #0a0a0a;
      color: #dedede;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      user-select: none;
    }

    .page-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      text-align: center;
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .page-header h1 {
      font-size: 1em;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.5), 0 0 24px rgba(100, 180, 255, 0.25);
    }

    .page-header strong {
      display: block;
      font-size: .5em;
      color: #7a8599;
      margin-top: 4px;
      font-weight: 400;
    }

    .gallery-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-scene {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 900px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .gallery-track {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      transform: rotateX(-18deg);
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .gallery-item {
      position: absolute;
      width: 170px;
      height: 170px;
      left: -85px;
      top: -85px;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .gallery-item .card-face {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
      border: 2px solid rgba(255, 255, 255, 0.06);
      background: #1a1a1a;
      backface-visibility: hidden;
    }

    .gallery-item.is-active .card-face {
      border-color: rgba(100, 180, 255, 0.35);
      box-shadow:
        0 0 15px rgba(100, 180, 255, 0.25),
        0 0 40px rgba(100, 180, 255, 0.15),
        0 0 70px rgba(100, 180, 255, 0.08),
        0 8px 28px rgba(0, 0, 0, 0.5);
    }

    .card-reflection {
      position: absolute;
      left: 0;
      right: 0;
      top: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      transform: scaleY(-1);
      pointer-events: none;
      opacity: 0;
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 60%);
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 60%);
      transition: opacity 0.4s ease;
    }

    .gallery-item.is-active .card-reflection {
      opacity: 1;
    }

    .card-reflection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .gallery-item .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .gallery-item:not(.is-active) .card-face img {
      filter: grayscale(1) brightness(0.45);
    }

    .gallery-item.is-active .card-face img {
      filter: grayscale(0) brightness(1);
    }

    .gallery-item:not(.is-active) .card-face::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      pointer-events: none;
    }

    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 14px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }

    .gallery-item.is-active .card-overlay {
      opacity: 1;
    }

    .card-overlay h2 {
      font-size: 0.9em;
      font-weight: 700;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
      margin: 0 0 2px;
    }

    .card-overlay em {
      font-size: 0.65em;
      color: #aaa;
      font-style: normal;
      text-shadow: 1px 1px 2px #000;
    }

    .empty-card .card-face {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      gap: 6px;
      font-size: 0.8em;
    }

    .empty-card .card-face i {
      font-size: 1.6em;
      opacity: 0.3;
    }

    .empty-card .card-face::after { display: none; }

    .dots {
      flex-shrink: 0;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 0 20px;
    }

    .dots .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: all 0.3s ease;
    }

    .dots .dot.active {
      background: var(--accent, #6490f6);
      box-shadow: 0 0 8px rgba(100, 180, 255, 0.5);
      width: 18px;
      border-radius: 3px;
    }

    .firefly {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(120, 255, 120, 0.6);
      box-shadow: 0 0 6px 2px rgba(120, 255, 120, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fireflyDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      50% { opacity: 0.3; }
      90% { opacity: 0.6; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }

    @media (min-width: 500px) {
      .gallery-item { width: 210px; height: 210px; left: -105px; top: -105px; }
    }

    @media (max-width: 360px) {
      .gallery-item { width: 150px; height: 150px; left: -75px; top: -75px; }
    }
  </style>
</head>
<body>
  <div class="page-header" id="pageHeader">
    <h1>小宝伴眠助手</h1>
    <strong>左右滑动浏览专辑</strong>
  </div>

  <div class="gallery-viewport" id="galleryViewport">
    <div class="gallery-scene">
      <div class="gallery-track" id="galleryTrack"></div>
    </div>
  </div>

  <div class="dots" id="dots"></div>

  <script>
    const albums = [
      { key: "xi",  name: "波西和皮普",  sub: "11 个故事",  cover: "picture/cover1.jpg",       link: "player.html?album=xi",  real: true },
      { key: "cat", name: "11只猫的故事", sub: "故事加载中...", cover: "picture-11cat/cover2.jpg", link: "player.html?album=cat", real: true },
      { key: "e3",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
      { key: "e4",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
      { key: "e5",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
      { key: "e6",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
      { key: "e7",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
      { key: "e8",  name: "即将上线",     sub: "敬请期待",   cover: "", link: "", real: false },
    ];

    const n = albums.length;
    const track = document.getElementById("galleryTrack");
    const viewport = document.getElementById("galleryViewport");
    const dotsContainer = document.getElementById("dots");

    let currentIndex = 0;
    let currentAngle = 0;
    let targetAngle = 0;
    const angleStep = (Math.PI * 2) / n;

    let isDragging = false;
    let startX = 0;
    let dragStartAngle = 0;

    function buildGallery() {
      track.innerHTML = "";
      dotsContainer.innerHTML = "";

      albums.forEach((album, i) => {
        const item = document.createElement("div");
        item.className = "gallery-item" + (album.real ? "" : " empty-card");
        item.dataset.index = i;

        if (album.real && album.cover) {
          item.innerHTML = `
            <div class="card-face">
              <img src="${album.cover}" alt="${album.name}" draggable="false" />
              <div class="card-overlay">
                <h2>${album.name}</h2>
                <em>${album.sub}</em>
              </div>
            </div>
            <div class="card-reflection">
              <img src="${album.cover}" alt="" draggable="false" />
            </div>`;
          item.addEventListener("click", () => {
            if (parseInt(item.dataset.index) === currentIndex) {
              location.href = album.link;
            }
          });
        } else {
          item.innerHTML = `
            <div class="card-face">
              <i class="fa-solid fa-lock"></i>
              <span>即将上线</span>
            </div>`;
        }

        track.appendChild(item);

        const dot = document.createElement("div");
        dot.className = "dot";
        dotsContainer.appendChild(dot);
      });

      updatePositions();
    }

    function updatePositions() {
      const items = track.querySelectorAll(".gallery-item");
      const dots = dotsContainer.querySelectorAll(".dot");

      items.forEach((item, i) => {
        const angle = angleStep * i + currentAngle;
        const x = Math.sin(angle) * 220;
        const z = Math.cos(angle) * 220;
        const y = (1 - Math.cos(angle)) * -40;

        const scale = 0.6 + 0.4 * ((z + 220) / 440);

        item.style.transform = `translateX(${x}px) translateY(${y}px) translateZ(${z}px) scale(${scale})`;
        item.style.zIndex = Math.round((z + 220) * 10);

        const isActive = i === currentIndex;
        item.classList.toggle("is-active", isActive);
      });

      dots.forEach((dot, i) => {
        dot.classList.toggle("active", i === currentIndex);
      });
    }

    function snapToNearest() {
      let normalized = currentAngle % (Math.PI * 2);
      if (normalized < 0) normalized += Math.PI * 2;

      let bestIndex = 0;
      let bestDist = Infinity;

      for (let i = 0; i < n; i++) {
        const targetAngleI = -angleStep * i;
        let normTarget = targetAngleI % (Math.PI * 2);
        if (normTarget < 0) normTarget += Math.PI * 2;

        let diff = Math.abs(normalized - normTarget);
        if (diff > Math.PI) diff = Math.PI * 2 - diff;

        if (diff < bestDist) {
          bestDist = diff;
          bestIndex = i;
        }
      }

      currentIndex = bestIndex;
      targetAngle = -angleStep * currentIndex;

      let diff = targetAngle - currentAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      targetAngle = currentAngle + diff;

      track.style.transition = "transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      currentAngle = targetAngle;
      updatePositions();
    }

    function onStart(clientX) {
      isDragging = true;
      startX = clientX;
      dragStartAngle = currentAngle;
      track.style.transition = "none";
    }

    function onMove(clientX) {
      if (!isDragging) return;
      const dx = clientX - startX;
      const angleDelta = dx / 180;
      currentAngle = dragStartAngle + angleDelta;
      updatePositions();
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      snapToNearest();
    }

    viewport.addEventListener("touchstart", (e) => onStart(e.touches[0].clientX), { passive: true });
    viewport.addEventListener("touchmove", (e) => { onMove(e.touches[0].clientX); e.preventDefault(); }, { passive: false });
    viewport.addEventListener("touchend", () => onEnd(), { passive: true });

    viewport.addEventListener("mousedown", (e) => { onStart(e.clientX); e.preventDefault(); });
    window.addEventListener("mousemove", (e) => onMove(e.clientX));
    window.addEventListener("mouseup", () => onEnd());

    buildGallery();

    (function initFireflies() {
      const header = document.getElementById("pageHeader");
      for (let i = 0; i < 8; i++) {
        const dot = document.createElement("div");
        dot.className = "firefly";
        dot.style.left = Math.random() * 100 + "%";
        dot.style.top = Math.random() * 100 + "%";
        dot.style.setProperty("--dx", (Math.random() - 0.5) * 60 + "px");
        dot.style.setProperty("--dy", (Math.random() - 0.5) * 30 + "px");
        const dur = 4 + Math.random() * 6;
        dot.style.animation = `fireflyDrift ${dur}s ${Math.random() * dur}s ease-in-out infinite`;
        header.appendChild(dot);
      }
    })();
  </script>
</body>
</html>
