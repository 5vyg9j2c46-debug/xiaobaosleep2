<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小宝伴眠助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;700&display=swap");

    :root {
      --bg-color: #0a0a0a;
      --card-bg: #1a1a1a;
      --text-primary: #e0e0e0;
      --text-secondary: #888;
      --accent: #6490f6;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Raleway', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(16px) saturate(1.2);
      -webkit-backdrop-filter: blur(16px) saturate(1.2);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .page-header .app-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow:
        0 0 8px rgba(100, 180, 255, 0.6),
        0 0 20px rgba(100, 180, 255, 0.3),
        0 0 40px rgba(100, 180, 255, 0.15);
      position: relative;
      z-index: 2;
    }

    .firefly {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(120, 255, 120, 0.6);
      box-shadow: 0 0 6px 2px rgba(120, 255, 120, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fireflyDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      50% { opacity: 0.3; }
      90% { opacity: 0.6; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }

    .albums-container {
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0 4px;
    }

    .album-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .album-card {
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: transform 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .album-card:active {
      transform: scale(0.96);
    }

    .album-cover-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      border: 1.5px solid rgba(255, 255, 255, 0.06);
    }

    .album-cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .album-cover-wrap .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .album-card:hover .play-overlay {
      opacity: 1;
    }

    .play-overlay .play-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.1rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .album-info {
      padding: 10px 4px 0;
    }

    .album-info .album-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 2px;
    }

    .album-info .album-count {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    @media (max-width: 380px) {
      .albums-container { padding: 20px 16px 36px; }
      .album-grid { gap: 12px; }
      .album-info .album-name { font-size: 0.8rem; }
    }

    @media (min-width: 500px) {
      .albums-container { max-width: 480px; margin: 0 auto; }
    }
  </style>
</head>
<body>

  <div class="page-header" id="pageHeader">
    <div class="app-title">小宝伴眠助手</div>
  </div>

  <div class="albums-container">
    <div class="section-title">选择专辑</div>
    <div class="album-grid">

      <div class="album-card" onclick="location.href='player.html?album=xi'">
        <div class="album-cover-wrap">
          <img src="picture/cover1.jpg" alt="波西和皮普" />
          <div class="play-overlay">
            <div class="play-icon"><i class="fa-solid fa-play"></i></div>
          </div>
        </div>
        <div class="album-info">
          <div class="album-name">波西和皮普</div>
          <div class="album-count">11 个故事</div>
        </div>
      </div>

      <div class="album-card" onclick="location.href='player.html?album=cat'">
        <div class="album-cover-wrap">
          <img src="picture-11cat/cover2.jpg" alt="11只猫的故事" />
          <div class="play-overlay">
            <div class="play-icon"><i class="fa-solid fa-play"></i></div>
          </div>
        </div>
        <div class="album-info">
          <div class="album-name">11只猫的故事</div>
          <div class="album-count">故事加载中...</div>
        </div>
      </div>

    </div>
  </div>

  <script>
    (function initFireflies() {
      const header = document.getElementById("pageHeader");
      const count = 10;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement("div");
        dot.className = "firefly";
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        dot.style.left = x + "%";
        dot.style.top = y + "%";
        const dx = (Math.random() - 0.5) * 60;
        const dy = (Math.random() - 0.5) * 30;
        dot.style.setProperty("--dx", dx + "px");
        dot.style.setProperty("--dy", dy + "px");
        const dur = 4 + Math.random() * 6;
        const delay = Math.random() * dur;
        dot.style.animation = `fireflyDrift ${dur}s ${delay}s ease-in-out infinite`;
        header.appendChild(dot);
      }
    })();
  </script>
</body>
</html>
