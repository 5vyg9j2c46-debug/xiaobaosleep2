<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小宝伴眠助手</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Saira:wght@400;600;700&display=swap");

    @property --k {
      syntax: '<number>';
      initial-value: -1;
      inherits: true
    }

    * { margin: 0; box-sizing: border-box; }

    html {
      scrollbar-width: none;
      height: calc(var(--n)*100%)
    }

    body, header, main, section,
    article, figure { display: grid }

    body {
      --dir: 0;
      grid-template-rows: max-content 1fr max-content;
      position: fixed;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      color: #dedede;
      font: clamp(.625em, 3vmin, 1.5em)/ 1.25 'Saira', sans-serif;
      animation: k 1s linear;
      animation-timeline: scroll();
      background: #0a0a0a;
      overflow-x: hidden;
    }

    @keyframes k { to { --k: 1 } }

    header {
      place-content: center;
      place-items: center;
      padding: 14px 16px;
      text-align: center;
      text-wrap: balance;
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    header h1 {
      font-size: 1em;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.5), 0 0 24px rgba(100, 180, 255, 0.25);
    }

    header strong {
      display: block;
      font-size: .5em;
      color: #7a8599;
      margin-top: 4px;
      font-weight: 400;
    }

    header em {
      display: block;
      font-size: .45em;
      color: #555;
      margin-top: 2px;
      max-width: 32em;
    }

    main {
      overflow: hidden;
      perspective: 50em
    }

    section, article { transform-style: preserve-3d }

    section {
      --r: calc(2 + var(--dir))/ 3;
      --w: clamp(6em, min(50vh, 30vw), 20em);
      --z: calc(var(--f, 1.25)*-.5*var(--w)/tan(.5turn/var(--n)));
      place-self: center;
      translate: 0 0 var(--z);
      rotate: var(--dir) calc(1 - var(--dir)) 0 calc((var(--k) + .5)*-1turn);
    }

    article, header, figure, img { grid-area: 1/ 1 }

    article {
      --j: var(--i)/var(--n);
      --dif-lin: calc(var(--j) - mod(var(--k) + 1, 1));
      --abs-lin: abs(var(--dif-lin));
      --dif-mid: calc(.5 - var(--abs-lin));
      --abs-mid: abs(var(--dif-mid));
      --dif-arc: calc(2*(.5 - var(--abs-mid)));
      --lim: .35;
      --sel: max(0, calc((var(--lim) - var(--dif-arc))/var(--lim)));
      --out: calc(1 - var(--sel));
      width: var(--w);
      aspect-ratio: var(--r);
      transform:
        rotate3d(var(--dir), calc(1 - var(--dir)), 0, calc(var(--j)*1turn))
        translatez(var(--z))
        rotate(calc(var(--dir)*.5turn));
      cursor: pointer;
      transition: filter 0.3s ease;

      @supports not (scale: abs(-1)) {
        --abs-lin: max(var(--dif-lin), -1*var(--dif-lin));
        --abs-mid: max(var(--dif-mid), -1*var(--dif-mid))
      }
    }

    article figure {
      overflow: hidden;
      position: relative;
      border: solid 3px rgba(255,255,255,0.08);
      border-radius: .6em;
      backface-visibility: hidden;
      box-shadow: 5px 5px 13px #000;
      background: #121212;
      pointer-events: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    article.is-front figure {
      border-color: rgba(100, 180, 255, 0.3);
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.15), 5px 5px 13px #000;
    }

    article:not(.is-front) figure::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      pointer-events: none;
    }

    article figure header {
      background: none;
      border: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      padding: 0;
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 10px 8px;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      pointer-events: none;
      z-index: 2;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    article.is-front .card-info {
      opacity: 1;
    }

    .card-info h2 {
      font-size: 1em;
      font-weight: 700;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
      margin: 0;
    }

    .card-info em {
      font-size: .7em;
      color: #aaa;
      font-style: normal;
      text-shadow: 1px 1px 2px #000;
    }

    img {
      width: 100%;
      height: 100%;
      aspect-ratio: var(--r);
      object-fit: cover;
      object-position: var(--pos);
      transition: filter 0.3s ease;
    }

    article:not(.is-front) img {
      filter: grayscale(1) brightness(0.7);
    }

    article.is-front img {
      filter: grayscale(0) brightness(1);
    }

    .empty-cover {
      width: 100%;
      height: 100%;
      aspect-ratio: var(--r);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #333;
      font-size: .8em;
      gap: 6px;
    }

    .empty-cover i {
      font-size: 1.6em;
      opacity: .3;
    }

    footer { display: block; }

    .firefly {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(120, 255, 120, 0.6);
      box-shadow: 0 0 6px 2px rgba(120, 255, 120, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fireflyDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      50% { opacity: 0.3; }
      90% { opacity: 0.6; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }

    @media (max-aspect-ratio: 2/ 3) { :root { --dir: 1 } }

    @media (max-width: 480px) {
      section { --w: clamp(5em, min(45vh, 28vw), 16em); }
      header h1 { font-size: .95em; }
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body>
  <header id="pageHeader">
    <h1>小宝伴眠助手</h1>
    <strong>上下滑动浏览专辑</strong>
    <em>点击封面进入播放</em>
  </header>

  <main>
    <section class="assembly">
      <article style="--i: 0; --url: url(picture/cover1.jpg); --pos: 50% 40%" onclick="location.href='player.html?album=xi'">
        <figure>
          <img src="picture/cover1.jpg" alt="波西和皮普" />
          <header>
            <div class="card-info">
              <h2>波西和皮普</h2>
              <em>11 个故事</em>
            </div>
          </header>
        </figure>
      </article>

      <article style="--i: 1; --url: url(picture-11cat/cover2.jpg); --pos: 50% 40%" onclick="location.href='player.html?album=cat'">
        <figure>
          <img src="picture-11cat/cover2.jpg" alt="11只猫的故事" />
          <header>
            <div class="card-info">
              <h2>11只猫的故事</h2>
              <em>故事加载中...</em>
            </div>
          </header>
        </figure>
      </article>

      <article class="is-empty" style="--i: 2">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>

      <article class="is-empty" style="--i: 3">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>

      <article class="is-empty" style="--i: 4">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>

      <article class="is-empty" style="--i: 5">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>

      <article class="is-empty" style="--i: 6">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>

      <article class="is-empty" style="--i: 7">
        <figure>
          <div class="empty-cover"><i class="fa-solid fa-lock"></i>即将上线</div>
        </figure>
      </article>
    </section>
  </main>

  <footer></footer>

  <script>
    let n = document.querySelectorAll('article').length;
    document.documentElement.style.setProperty('--n', n);

    const articles = document.querySelectorAll('article');

    function f(k) {
      if(Math.abs(k) > .5)
        scrollTo(0, .5*(k - Math.sign(k) + 1)*(document.documentElement.offsetHeight - window.innerHeight))
    }

    f(-1);

    addEventListener('scroll', () => {
      const k = +getComputedStyle(document.body).getPropertyValue('--k');
      f(k);

      articles.forEach(a => {
        const sel = +getComputedStyle(a).getPropertyValue('--sel');
        a.classList.toggle('is-front', sel > 0.8);
      });
    });

    (function initFireflies() {
      const header = document.getElementById("pageHeader");
      const count = 8;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement("div");
        dot.className = "firefly";
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        dot.style.left = x + "%";
        dot.style.top = y + "%";
        const dx = (Math.random() - 0.5) * 60;
        const dy = (Math.random() - 0.5) * 30;
        dot.style.setProperty("--dx", dx + "px");
        dot.style.setProperty("--dy", dy + "px");
        const dur = 4 + Math.random() * 6;
        const delay = Math.random() * dur;
        dot.style.animation = `fireflyDrift ${dur}s ${delay}s ease-in-out infinite`;
        header.appendChild(dot);
      }
    })();
  </script>
</body>
</html>
