<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小宝伴眠助手</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Saira:wght@400;600;700&display=swap");

    * { margin: 0; box-sizing: border-box; }

    body {
      font-family: 'Saira', sans-serif;
      background: #0a0a0a;
      color: #dedede;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      -webkit-user-select: none;
      user-select: none;
      touch-action: pan-y;
    }

    .page-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px 16px;
      text-align: center;
      position: relative;
      z-index: 10;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px) saturate(1.3);
      -webkit-backdrop-filter: blur(20px) saturate(1.3);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .page-header h1 {
      font-size: 1em;
      font-weight: 700;
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 10px rgba(100, 180, 255, 0.5), 0 0 24px rgba(100, 180, 255, 0.25);
    }

    .page-header strong {
      display: block;
      font-size: .5em;
      color: #7a8599;
      margin-top: 4px;
      font-weight: 400;
    }

    .gallery-viewport {
      flex: 1;
      position: relative;
      overflow: hidden;
      perspective: 800px;
    }

    .gallery-track {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .gallery-item {
      position: absolute;
      width: 180px;
      height: 180px;
      left: -90px;
      top: -90px;
      transform-style: preserve-3d;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                  filter 0.4s ease,
                  opacity 0.4s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .gallery-item .card-face {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.08);
      background: #1a1a1a;
    }

    .gallery-item.is-active .card-face {
      border-color: rgba(100, 180, 255, 0.4);
      box-shadow: 0 0 24px rgba(100, 180, 255, 0.2), 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    .gallery-item .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-item:not(.is-active) .card-face img {
      filter: grayscale(1) brightness(0.5);
    }

    .gallery-item.is-active .card-face img {
      filter: grayscale(0) brightness(1);
    }

    .gallery-item:not(.is-active)::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.4);
      pointer-events: none;
    }

    .gallery-item.is-active::after {
      display: none;
    }

    .card-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 10px 10px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      z-index: 2;
    }

    .gallery-item.is-active .card-overlay {
      opacity: 1;
    }

    .card-overlay h2 {
      font-size: 0.95em;
      font-weight: 700;
      color: #fff;
      text-shadow: 1px 1px 3px #000;
      margin: 0 0 2px;
    }

    .card-overlay em {
      font-size: 0.7em;
      color: #aaa;
      font-style: normal;
      text-shadow: 1px 1px 2px #000;
    }

    .empty-card .card-face {
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #333;
      gap: 6px;
      font-size: 0.8em;
    }

    .empty-card .card-face i {
      font-size: 1.6em;
      opacity: 0.3;
    }

    .firefly {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(120, 255, 120, 0.6);
      box-shadow: 0 0 6px 2px rgba(120, 255, 120, 0.4);
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fireflyDrift {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      50% { opacity: 0.3; }
      90% { opacity: 0.6; }
      100% { transform: translate(var(--dx), var(--dy)); opacity: 0; }
    }

    @media (min-width: 500px) {
      .gallery-item { width: 220px; height: 220px; left: -110px; top: -110px; }
    }

    @media (max-width: 360px) {
      .gallery-item { width: 160px; height: 160px; left: -80px; top: -80px; }
    }
  </style>
</head>
<body>
  <div class="page-header" id="pageHeader">
    <h1>小宝伴眠助手</h1>
    <strong>左右滑动浏览专辑</strong>
  </div>

  <div class="gallery-viewport" id="galleryViewport">
    <div class="gallery-track" id="galleryTrack"></div>
  </div>

  <script>
    const albums = [
      { key: "xi",  name: "波西和皮普",    sub: "11 个故事",  cover: "picture/cover1.jpg",          link: "player.html?album=xi",  active: true },
      { key: "cat", name: "11只猫的故事",   sub: "故事加载中...", cover: "picture-11cat/cover2.jpg",    link: "player.html?album=cat", active: true },
      { key: "e3",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
      { key: "e4",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
      { key: "e5",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
      { key: "e6",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
      { key: "e7",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
      { key: "e8",  name: "即将上线",       sub: "敬请期待",   cover: "", link: "", active: false },
    ];

    const n = albums.length;
    const track = document.getElementById("galleryTrack");
    const viewport = document.getElementById("galleryViewport");
    let current = 0;
    let radius = 220;
    let startX = 0;
    let isDragging = false;
    let dragOffset = 0;

    function getRadius() {
      const w = viewport.offsetWidth;
      if (w < 380) return 180;
      if (w < 500) return 220;
      return 260;
    }

    function buildGallery() {
      track.innerHTML = "";
      radius = getRadius();

      albums.forEach((album, i) => {
        const item = document.createElement("div");
        item.className = "gallery-item" + (album.active ? "" : " empty-card");
        item.dataset.index = i;

        const angle = (i / n) * Math.PI * 2;
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius - radius;

        item.style.transform = `translateX(${x}px) translateZ(${z}px) scale(${0.5 + 0.5 * (z + radius) / (2 * radius)})`;

        if (album.active && album.cover) {
          item.innerHTML = `
            <div class="card-face">
              <img src="${album.cover}" alt="${album.name}" draggable="false" />
              <div class="card-overlay">
                <h2>${album.name}</h2>
                <em>${album.sub}</em>
              </div>
            </div>`;
          item.addEventListener("click", () => {
            if (item.classList.contains("is-active")) {
              location.href = album.link;
            }
          });
        } else {
          item.innerHTML = `
            <div class="card-face">
              <i class="fa-solid fa-lock"></i>
              <span>即将上线</span>
            </div>`;
        }

        track.appendChild(item);
      });

      updatePositions(0, false);
    }

    function updatePositions(offset, animate) {
      const items = track.querySelectorAll(".gallery-item");
      const angleStep = (Math.PI * 2) / n;

      if (animate) {
        track.style.transition = "transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
      } else {
        track.style.transition = "none";
      }

      items.forEach((item, i) => {
        const angle = angleStep * (i + offset / radius);
        const x = Math.sin(angle) * radius;
        const z = Math.cos(angle) * radius - radius;
        const scale = 0.5 + 0.5 * (z + radius) / (2 * radius);

        item.style.transform = `translateX(${x}px) translateZ(${z}px) scale(${scale})`;

        const isFront = z > -30;
        item.classList.toggle("is-active", isFront);
        item.style.zIndex = Math.round((z + radius) * 10);
      });
    }

    function snapToNearest(offset) {
      const angleStep = (Math.PI * 2) / n;
      const totalAngle = offset / radius;
      const nearestIndex = Math.round(-totalAngle / angleStep);
      const snappedAngle = -nearestIndex * angleStep;
      const snappedOffset = snappedAngle * radius;
      current = ((nearestIndex % n) + n) % n;
      return snappedOffset;
    }

    viewport.addEventListener("touchstart", (e) => {
      isDragging = true;
      startX = e.touches[0].clientX;
      dragOffset = 0;
      track.style.transition = "none";
    }, { passive: true });

    viewport.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      dragOffset = e.touches[0].clientX - startX;
      const baseOffset = current * ((Math.PI * 2) / n) * radius;
      updatePositions(-(baseOffset + dragOffset), false);
    }, { passive: true });

    viewport.addEventListener("touchend", () => {
      if (!isDragging) return;
      isDragging = false;

      const baseOffset = current * ((Math.PI * 2) / n) * radius;
      const totalOffset = baseOffset + dragOffset;
      const snapped = snapToNearest(-totalOffset);

      updatePositions(-snapped, true);
    }, { passive: true });

    viewport.addEventListener("mousedown", (e) => {
      isDragging = true;
      startX = e.clientX;
      dragOffset = 0;
      track.style.transition = "none";
      e.preventDefault();
    });

    window.addEventListener("mousemove", (e) => {
      if (!isDragging) return;
      dragOffset = e.clientX - startX;
      const baseOffset = current * ((Math.PI * 2) / n) * radius;
      updatePositions(-(baseOffset + dragOffset), false);
    });

    window.addEventListener("mouseup", () => {
      if (!isDragging) return;
      isDragging = false;

      const baseOffset = current * ((Math.PI * 2) / n) * radius;
      const totalOffset = baseOffset + dragOffset;
      const snapped = snapToNearest(-totalOffset);

      updatePositions(-snapped, true);
    });

    buildGallery();

    window.addEventListener("resize", () => {
      radius = getRadius();
      buildGallery();
    });

    (function initFireflies() {
      const header = document.getElementById("pageHeader");
      const count = 8;
      for (let i = 0; i < count; i++) {
        const dot = document.createElement("div");
        dot.className = "firefly";
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        dot.style.left = x + "%";
        dot.style.top = y + "%";
        const dx = (Math.random() - 0.5) * 60;
        const dy = (Math.random() - 0.5) * 30;
        dot.style.setProperty("--dx", dx + "px");
        dot.style.setProperty("--dy", dy + "px");
        const dur = 4 + Math.random() * 6;
        const delay = Math.random() * dur;
        dot.style.animation = `fireflyDrift ${dur}s ${delay}s ease-in-out infinite`;
        header.appendChild(dot);
      }
    })();
  </script>
</body>
</html>
